<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>complete responsive coffee shop</title>
    <!-- font aswome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <!-- costume css  -->
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <!-- header sectiion start -->
    <header class="header">
        <a href="#" class="logo">
            <img src="./img/67.png" alt="" />
        </a>

        <nav class="navbar">
            <a href="#home">home</a>
            <a href="#about">about</a>
            <a href="#menu">menu</a>
            <a href="#products">products</a>
            <a href="#review">review</a>
            <a href="#content">content</a>
            <a href="#blog">blog</a>
        </nav>

        <div class="icons">
            <div class="fas fa-search" id="search-btn"></div>
            <div class="fas fa-shopping-cart" id="cart-btn"></div>
            <div class="fas fa-bars" id="menu-btn"></div>
        </div>

        <div class="search-form">
            <input type="search" id="search-box" placeholder="search here..." />
            <label for="search-box" class="fas fa-search"></label>
        </div>

        <div class="cart-items-container">
            <div class="cart-item">
                <span class="fas fa-times"></span>
                <img src="./img/cart-item-1.png" alt="" />

                    <h3>cart item 01</h3>
                    <div class="price">$15.99</div>
                </div>
            </div>
            <div class="cart-item">
                <span class="fas fa-times"></span>

                <div class="content">
                    <h3>cart item 02</h3>
                    <div class="price">$15.99</div>
                </div>
            </div>
            <div class="cart-item">
                <span class="fas fa-times"></span>
                <img src="./img/cart-item-1.png" alt="" />
                <div class="content">
                    <h3>cart item 03</h3>
                    <div class="price">$15.99</div>
                </div>
            </div>
            <div class="cart-item">
                <span class="fas fa-times"></span>
                <img src="./img/cart-item-1.png" alt="" />
                <div class="content">
                    <h3>cart item 04</h3>
                    <div class="price">$15.99</div>
                </div>
            </div>
            <a href="#" class="btn">check out now</a>
        </div>
    </header>

    <!-- header sectiion end -->

    <!-- home section start -->

    <section class="home" id="home">
        <div class="content">
            <h3>fresh coffee in the morning</h3>
            <p>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Ea non quia
                eum beatae, voluptatem omnis.
            </p>
            <a href="#" class="btn">get yours now</a>

    <!-- home section end -->

    <!-- costume js  file link -->
    <script src="script.js"></script>

</html>
